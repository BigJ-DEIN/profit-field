<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Profit Field</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    html,body {
      width:100%;height:100%;background:#fff;
      /* overflow / touch-action / overscroll: set by JS вҖ” mobile only */
    }
    canvas { display:block;width:100%;height:100%;cursor:none; }
    /* safe-area helper вҖ” readable via JS */
    #safe-area-probe { position:fixed;bottom:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="safe-area-probe"></div>
<script>
'use strict';

const C = document.getElementById('c');
const g = C.getContext('2d');
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth<=768;
let W, H, cx, cy, DPR=1, SC=1; // SC = visual scale vs MacBook baseline (956px height)
// в”Җв”Җ Safe area вҖ” env(safe-area-inset-bottom) via probe element в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// probeмқҳ height = env(safe-area-inset-bottom) = нҷҲ мқёл””мјҖмқҙн„° + iOS мЈјмҶҢм°Ҫ нҸ¬н•Ё
// CSSлҠ” мһҗлҸҷ л°ҳмқ‘н•ҳлҜҖлЎң мҠӨнҒ¬лЎӨ лІ„нҠј bottomмқҖ CSSлЎңл§Ң мІҳлҰ¬.
// JS gauge к·ёлҰ¬кё°м—җл§Ң safeAreaBottom мӮ¬мҡ©.
let safeAreaBottom=0;
function readSafeArea(){
  const el=document.getElementById('safe-area-probe');
  if(el) safeAreaBottom=el.offsetHeight||0;
}
// ResizeObserver: мЈјмҶҢм°Ҫ л‘җк»ҳ л°”лҖ” л•Ң env()к°’ ліҖкІҪ вҶ’ probe лҶ’мқҙ ліҖкІҪ вҶ’ мҰүмӢң л°ҳмҳҒ
window.addEventListener('load',()=>{
  readSafeArea();
  const probe=document.getElementById('safe-area-probe');
  if(probe && window.ResizeObserver){
    new ResizeObserver(()=>{ safeAreaBottom=probe.offsetHeight||0; }).observe(probe);
  }
});

function resize(){
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight; // iframe м•Ҳм—җм„ң visualViewportлҠ” мЈјмҶҢм°Ҫ к°җм§Җ лӘ»н•Ё вҶ’ innerHeight мӮ¬мҡ©
  SC = isMobile ? Math.max(W, H) / 956 : Math.min(W, H) / 956;
  C.width  = Math.round(W * DPR);
  C.height = Math.round(H * DPR);
  C.style.width  = W + 'px';
  C.style.height = H + 'px';
  cx = W/2; cy = H/2;
  readSafeArea();
}
resize();
window.addEventListener('resize', resize);
// visualViewport resize = мЈјмҶҢм°Ҫ лҶ’мқҙ ліҖнҷ” к°җм§Җ (лӘЁл°”мқј кІҢмқҙм§Җ мң„м№ҳ мҰүмӢң л°ҳмҳҒ)
if(window.visualViewport) window.visualViewport.addEventListener('resize', resize);

// в”Җв”Җ Scroll button (mobile only) вҖ” up/down bidirectional в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
if(isMobile){
  const scrollStyle=document.createElement('style');
  scrollStyle.textContent=`
    @keyframes sparkU1{
      0%,100%{opacity:0.18;transform:translateY(0);}
      30%{opacity:0.95;transform:translateY(-3px);}
      60%{opacity:0.18;transform:translateY(0);}
    }
    @keyframes sparkU2{
      0%,20%,100%{opacity:0.08;transform:translateY(0);}
      55%{opacity:0.65;transform:translateY(-4px);}
      80%{opacity:0.08;transform:translateY(0);}
    }
    @keyframes sparkD1{
      0%,100%{opacity:0.18;transform:translateY(0);}
      30%{opacity:0.95;transform:translateY(3px);}
      60%{opacity:0.18;transform:translateY(0);}
    }
    @keyframes sparkD2{
      0%,20%,100%{opacity:0.08;transform:translateY(0);}
      55%{opacity:0.65;transform:translateY(4px);}
      80%{opacity:0.08;transform:translateY(0);}
    }
    #scroll-btn{
      position:fixed;
      right:16px;
      bottom:calc(88px + env(safe-area-inset-bottom,0px));
      width:48px;
      background:none;border:none;padding:0;
      display:flex;flex-direction:column;align-items:center;gap:0;
      -webkit-tap-highlight-color:transparent;
      z-index:100;
      user-select:none;-webkit-user-select:none;
    }
    .scroll-zone{
      display:flex;flex-direction:column;align-items:center;
      padding:7px 6px;cursor:pointer;touch-action:manipulation;
    }
    .scroll-zone:active{ opacity:0.4; }
    #scroll-btn .s-label{
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
      font-size:8px;letter-spacing:0.18em;
      font-weight:800;
      color:rgba(25,25,25,0.45);
      text-transform:uppercase;
      line-height:1;pointer-events:none;
    }
    #scroll-btn .cu1{ animation:sparkU1 2.0s ease-in-out infinite; }
    #scroll-btn .cu2{ animation:sparkU2 2.0s ease-in-out infinite; }
    #scroll-btn .cd1{ animation:sparkD1 2.0s ease-in-out infinite; }
    #scroll-btn .cd2{ animation:sparkD2 2.0s ease-in-out infinite; }
  `;
  document.head.appendChild(scrollStyle);

  const scrollBtn=document.createElement('div');
  scrollBtn.id='scroll-btn';
  scrollBtn.innerHTML=`
    <div id="scroll-up" class="scroll-zone">
      <svg class="cu2" width="32" height="10" viewBox="0 0 44 20" fill="none">
        <polyline points="3,17 22,3 41,17" stroke="rgba(15,15,15,0.85)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg class="cu1" width="32" height="10" viewBox="0 0 44 20" fill="none">
        <polyline points="3,17 22,3 41,17" stroke="rgba(15,15,15,0.85)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="s-label">scroll</span>
    <div id="scroll-down" class="scroll-zone">
      <svg class="cd1" width="32" height="10" viewBox="0 0 44 20" fill="none">
        <polyline points="3,3 22,17 41,3" stroke="rgba(15,15,15,0.85)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg class="cd2" width="32" height="10" viewBox="0 0 44 20" fill="none">
        <polyline points="3,3 22,17 41,3" stroke="rgba(15,15,15,0.85)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `;
  document.body.appendChild(scrollBtn);

  // мң„лЎң мҠӨнҒ¬лЎӨ (100vh)
  document.getElementById('scroll-up').addEventListener('click', ()=>{
    const h = window.innerHeight;
    try{ window.parent.postMessage({type:'scrollUp', amount:-h},'*'); }catch(_){}
    try{ window.parent.scrollBy({top:-h,behavior:'smooth'}); }catch(_){}
    window.scrollBy({top:-h,behavior:'smooth'});
  });

  // м•„лһҳлЎң мҠӨнҒ¬лЎӨ (100vh)
  document.getElementById('scroll-down').addEventListener('click', ()=>{
    const h = window.innerHeight;
    try{ window.parent.postMessage({type:'scrollDown', amount:h},'*'); }catch(_){}
    try{ window.parent.scrollBy({top:h,behavior:'smooth'}); }catch(_){}
    window.scrollBy({top:h,behavior:'smooth'});
  });
}

// в”Җв”Җ мҠӨнҒ¬лЎӨ мІҳлҰ¬: лӘЁл°”мқј м°ЁлӢЁ / лҚ°мҠӨнҒ¬нғ‘ мІҙмқҙлӢқ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
if(isMobile){
  // лӘЁл°”мқј: мҠӨнҒ¬лЎӨВ·мӨҢВ·rubber-band мҷ„м „ м°ЁлӢЁ (position:fixed = iOS Safari мҷ„лІҪ мһ кёҲ)
  const _s = s => { s.overflow='hidden'; s.position='fixed'; s.width='100%'; s.height='100%'; s.touchAction='none'; s.overscrollBehavior='none'; };
  _s(document.documentElement.style);
  _s(document.body.style);
  document.querySelector('canvas').style.touchAction='none';
} else {
  // лҚ°мҠӨнҒ¬нғ‘: overflow:auto + overscroll-behavior:auto лЎң лёҢлқјмҡ°м Җ scroll chaining нҷңм„ұнҷ”.
  // iframe мҪҳн…җмё (мә”лІ„мҠӨ)к°Җ л·°нҸ¬нҠёлҘј кҪү мұ„мӣҢ мҠӨнҒ¬лЎӨ н•ңкі„м—җ н•ӯмғҒ мһҲмңјлҜҖлЎң
  // нң  мқҙлІӨнҠёк°Җ мһҗлҸҷмңјлЎң л¶ҖлӘЁ Framer нҺҳмқҙм§ҖлЎң мІҙмқҙлӢқлҗЁ.
  document.documentElement.style.overflow='auto';
  document.body.style.overflow='auto';
  document.documentElement.style.overscrollBehavior='auto';
  document.body.style.overscrollBehavior='auto';
}

let mouseX=-9999, mouseY=-9999;
let lastMouseX=-9999, lastMouseY=-9999, mouseIdleFrames=0;

// в”Җв”Җ Water ripple system в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const ripples=[];
const RIPPLE_SPEED=5.5, RIPPLE_MAX_R=360, RIPPLE_WIDTH=45, RIPPLE_FORCE=0.36;
let lastRipX=-9999, lastRipY=-9999;

// (safeAreaBottom + readSafeArea defined above, before resize())

// в”Җв”Җ Multi-touch tracking в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const touchPoints=new Map(); // identifier вҶ’ {x,y}
let _touchClearTimer=null; // used to reset mouseX/Y after last finger lifts

function emitRipple(cx, cy){
  const dx=cx-lastRipX, dy=cy-lastRipY;
  if(dx*dx+dy*dy>225){
    ripples.push({x:cx,y:cy,r:5});
    lastRipX=cx; lastRipY=cy;
    if(ripples.length>14) ripples.shift();
  }
}

function handleMove(cx, cy){
  mouseX=cx; mouseY=cy;
  emitRipple(cx, cy);
}

window.addEventListener('mousemove', e=>{ handleMove(e.clientX, e.clientY); });

// в”Җв”Җ Touch support вҖ” attached to document so iOS Safari always fires в”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// (Canvas-level listeners can silently fail on iOS; document-level is bulletproof)

// Prevent default touch behavior (scroll / zoom / rubber-band) вҖ” mobile only.
// touchstart: buttons/links/scroll-zone мҳҲмҷё вҶ’ click мқҙлІӨнҠёк°Җ м •мғҒ л°ңнҷ”лҗҳлҸ„лЎқ
// touchmove: мҳҲмҷё м—Ҷмқҙ лӘЁл‘җ м°ЁлӢЁ вҶ’ scroll-zone мң„м—җм„ң л“ңлһҳк·ён•ҙлҸ„ мҠӨнҒ¬лЎӨ м•Ҳ лҗЁ
//   (clickмқҖ touchstart+touchend мҢҚм—җм„ң л°ңнҷ”лҗҳлҜҖлЎң touchmove м°ЁлӢЁмқҖ нҒҙлҰӯм—җ мҳҒн–Ҙ м—ҶмқҢ)
if(isMobile){
  document.addEventListener('touchstart', e=>{
    if(e.target.closest('button,a,[role="button"],.scroll-zone')) return;
    e.preventDefault();
  }, {passive:false});
  document.addEventListener('touchmove', e=>{
    e.preventDefault(); // мҳҲмҷё м—ҶмқҢ вҖ” л“ңлһҳк·ё мҠӨнҒ¬лЎӨ мҷ„м „ м°ЁлӢЁ
  }, {passive:false});
}

// лҚ°мҠӨнҒ¬нғ‘: wheel лҰ¬мҠӨл„ҲлҠ” passiveл§Ң л“ұлЎқ (preventDefault м—ҶмқҢ).
// overflow:auto + overscrollBehavior:auto лЎң лёҢлқјмҡ°м Җ мһҗмІҙ scroll chainingмқҙ лҸҷмһ‘.
// window.parent.scrollBy()лҠ” cross-origin(netlifyвү framer) SecurityErrorлЎң мӢӨнҢЁн•ҳлҜҖлЎң мӮ¬мҡ© м•Ҳ н•Ё.

document.addEventListener('touchstart', e=>{
  Array.from(e.changedTouches).forEach(t=>{
    touchPoints.set(t.identifier,{x:t.clientX,y:t.clientY});
    ripples.push({x:t.clientX,y:t.clientY,r:5}); // immediate ripple on tap
    if(ripples.length>14) ripples.shift();
  });
  mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY;
}, {passive:false});

document.addEventListener('touchmove', e=>{
  Array.from(e.changedTouches).forEach(t=>{
    touchPoints.set(t.identifier,{x:t.clientX,y:t.clientY});
    emitRipple(t.clientX,t.clientY);
  });
  mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY;
}, {passive:false});

document.addEventListener('touchend', e=>{
  Array.from(e.changedTouches).forEach(t=>touchPoints.delete(t.identifier));
  if(e.touches.length>0){
    if(_touchClearTimer){ clearTimeout(_touchClearTimer); _touchClearTimer=null; }
    mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY;
  } else {
    // All fingers lifted вҖ” briefly keep position so current rAF frame can
    // catch a signal, then reset so the 'formed' state disperses naturally.
    if(_touchClearTimer) clearTimeout(_touchClearTimer);
    _touchClearTimer=setTimeout(()=>{ mouseX=-9999; mouseY=-9999; _touchClearTimer=null; }, 80);
  }
}, {passive:true});

document.addEventListener('touchcancel', e=>{
  Array.from(e.changedTouches).forEach(t=>touchPoints.delete(t.identifier));
  if(e.touches.length===0){ if(_touchClearTimer) clearTimeout(_touchClearTimer); mouseX=-9999; mouseY=-9999; }
}, {passive:true});

let frame=0;
function dist2(ax,ay,bx,by){ const dx=ax-bx,dy=ay-by; return dx*dx+dy*dy; }

// в”Җв”Җ Content generators в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function randNumStr(){
  const r=Math.random();
  if(r<0.25) return String(Math.floor(Math.random()*999999)+10);
  if(r<0.50){
    const i=Math.floor(Math.random()*999),d=Math.floor(Math.random()*100000),n=Math.floor(Math.random()*4)+1;
    return `${i}.${String(d).padStart(n+1,'0').slice(0,n+1)}`;
  }
  if(r<0.72){
    const b=(1+Math.random()*8.9).toFixed(Math.floor(Math.random()*4)+2);
    const e=Math.floor(Math.random()*12)-6;
    return `${b}Г—10${e<0?'вҒ»'+Math.abs(e):String(e)}`;
  }
  if(Math.random()<0.5) return (Math.random()).toFixed(Math.floor(Math.random()*5)+2);
  return `${Math.floor(Math.random()*12)+1}/${Math.floor(Math.random()*200)+2}`;
}
const MATH_EXPRS=['вҲӮВІПҲ/вҲӮtВІ=cВІвҲҮВІПҲ','вҲҮВІПҶ=ПҒ/ОөвӮҖ','вҲ®EВ·dA=Q/ОөвӮҖ','вҲ®BВ·dA=0',
  'вҲ«вӮӢвҲһ^вҲһeвҒ»ЛЈВІdx=вҲҡПҖ','lim(1+1/n)вҒҝ=e','вҲҖОө>0вҲғОҙ>0',
  'ДӨПҲ=iв„ҸвҲӮПҲ/вҲӮt','[xМӮ,pМӮ]=iв„Ҹ','ПғвӮ“ПғвӮҡвүҘв„Ҹ/2','вҹЁПҲ|ДӨ|ПҲвҹ©=E',
  'e^{iПҖ}+1=0','О¶(s)=вҲҸ(1вҲ’pвҒ»Лў)вҒ»В№','Z=вҲ«DПҶe^{iS/в„Ҹ}',
  'KL(PвҖ–Q)=вҲ‘PВ·ln(P/Q)','вҲҮ_ОёL=1/nвҲ‘вҲӮв„“/вҲӮОё',
  'P(A|B)=P(B|A)P(A)/P(B)','Var(X)=E[XВІ]вҲ’E[X]ВІ'];
const NAMES=['JEE','JAY'];
function randContent(){
  const r=Math.random();
  if(r<0.07) return NAMES[Math.random()*NAMES.length|0];
  if(r<0.64) return randNumStr();
  return MATH_EXPRS[Math.random()*MATH_EXPRS.length|0];
}
function randChar(){ return randContent().charAt(0)||'вҖў'; }
const COLORS=[[20,20,20],[20,20,20],[20,20,20],[30,50,120],[100,20,20],[20,80,50]];

// в”Җв”Җ 3-D Particle field в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const FOCAL=520, Z_FAR=1600, Z_NEAR=480;

class Pt {
  constructor(initial=false){ this.excite=0; this.wavOff=Math.random()*Math.PI*2; this.sx=0; this.sy=0; this.init(initial); }
  init(initial=false){
    this.x=(Math.random()-.5)*2200; this.y=(Math.random()-.5)*2200;
    this.z=initial?Math.random()*Z_FAR:Z_FAR+Math.random()*300;
    this.vx=(Math.random()-.5)*.35; this.vy=(Math.random()-.5)*.35;
    this.vz=-(0.6+Math.random()*2.2);
    this.char=randContent(); this.cd=(30+Math.random()*80)|0;
    this.nameAlpha=NAMES.includes(this.char)?0.10+Math.random()*0.20:-1;
    const col=COLORS[Math.random()*COLORS.length|0];
    this.cr=col[0]; this.cg=col[1]; this.cb=col[2];
  }
  update(sigs){
    const sc=FOCAL/Math.max(1,FOCAL+this.z);
    const px=cx+this.x*sc, py=cy+this.y*sc;

    // в”Җв”Җ Water ripple displacement в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Each expanding ring passes through particles and pushes them outward
    // (sinusoidal profile: leading crest pushes, trailing trough pulls back)
    for(const rip of ripples){
      const rdx=px-rip.x, rdy=py-rip.y;
      const rd=Math.sqrt(rdx*rdx+rdy*rdy);
      if(rd<1) continue;
      const diff=rd-rip.r;                    // signed dist from ring centre
      if(Math.abs(diff)<RIPPLE_WIDTH){
        // t in [-1,1]: -1 = behind ring, 0 = ring centre, +1 = ahead of ring
        const t=diff/RIPPLE_WIDTH;
        // sin profile: positive push at ring, gentle pull behind (water-like)
        const profile=-Math.sin(t*Math.PI);
        // Amplitude decays with distance (1/вҲҡr like real 2-D waves) + range fade
        const decay=(1-rip.r/RIPPLE_MAX_R)*Math.min(1,40/Math.sqrt(Math.max(1,rip.r)));
        const force=RIPPLE_FORCE*profile*decay;
        this.vx+=(rdx/rd)*force/sc;
        this.vy+=(rdy/rd)*force/sc;
      }
    }

    // Mouse-idle drift: when cursor is still, particles slowly drift back toward it
    const mdx=px-mouseX, mdy=py-mouseY;
    const md=Math.sqrt(mdx*mdx+mdy*mdy);
    if(mouseIdleFrames>45&&mouseX>-100){
      const idleT=Math.min(1,(mouseIdleFrames-45)/90); // ramps up over ~1.5s
      if(md>60&&md<420){
        const attrF=0.00035*idleT/sc;
        this.vx+=(-mdx/md)*attrF;
        this.vy+=(-mdy/md)*attrF;
      }
    }
    // Magnetic combo effect: high combo pulls particles toward cursor
    if(combo>=5&&mouseX>-100&&md>30&&md<350){
      const magStr=Math.min(combo-4,6)*0.00018/sc;
      this.vx+=(-mdx/md)*magStr;
      this.vy+=(-mdy/md)*magStr;
    }
    // Signal effects вҖ” iterate all active signals
    let inZone=false;
    for(const sig of sigs){
      if(sig.triggered) continue;
      const sdx=px-sig.x, sdy=py-sig.y;
      const sdist=Math.sqrt(sdx*sdx+sdy*sdy);
      const zone=sig.r*3.5;
      if(sdist<zone){
        inZone=true;
        const e=(1-sdist/zone)*sig.intensity;
        if(e>0.12&&this.cd>2) this.cd=Math.max(1,this.cd-Math.ceil(e*10));
        switch(sig.type){
          case 0: this.excite=Math.max(this.excite,e*0.5); break;
          case 1: this.vx+=(sig.x-px)*0.0012/sc*e; this.vy+=(sig.y-py)*0.0012/sc*e; this.excite=Math.max(this.excite,e*0.55); break;
          case 2: this.vx+=(Math.random()-.5)*0.08*e/sc; this.vy+=(Math.random()-.5)*0.08*e/sc; this.excite=Math.min(1,this.excite+0.12*e); break;
          case 3: if(Math.random()<0.14*e){this.char=randContent();this.cd=2;} this.excite=Math.max(this.excite,e*0.4); break;
          case 4: { const angle=Math.atan2(sdy,sdx); this.vx+=-Math.sin(angle)*0.015*e/sc; this.vy+=Math.cos(angle)*0.015*e/sc; this.vx+=(sig.x-px)*0.0004/sc*e; this.vy+=(sig.y-py)*0.0004/sc*e; } this.excite=Math.max(this.excite,e*0.6); break;
          case 5: { const pulse=Math.sin(frame*0.045+sdist*0.022)*0.5+0.5; this.vx+=(sig.x-px)*0.0015/sc*e*pulse; this.vy+=(sig.y-py)*0.0015/sc*e*pulse; } this.excite=Math.max(this.excite,e*0.45); break;
        }
      }
    }
    if(!inZone){ this.excite=Math.max(0,this.excite-0.025); }
    this.vx*=.972; this.vy*=.972;
    this.x+=this.vx; this.y+=this.vy; this.z+=this.vz;
    const flip=Math.max(3,120-sc*90)|0;
    if(--this.cd<=0){ this.char=randContent(); this.cd=flip; this.nameAlpha=NAMES.includes(this.char)?0.10+Math.random()*0.20:-1; }
  }
  get dead(){ return this.z<Z_NEAR; }
  draw(sigs){
    const sc=FOCAL/Math.max(1,FOCAL+this.z);
    let px=cx+this.x*sc, py=cy+this.y*sc;
    // WAVE displacement + FLASH boost вҖ” iterate all active signals
    let flashBoost=0;
    for(const sig of sigs){
      if(sig.triggered) continue;
      if(sig.type===0){
        const sdx=px-sig.x,sdy=py-sig.y,sdist=Math.sqrt(sdx*sdx+sdy*sdy);
        const zone=sig.r*3.2;
        if(sdist<zone){ const I=(1-sdist/zone)*sig.intensity,amp=12*I,spd=frame*0.068+this.wavOff; px+=Math.sin(spd+sdist*0.05)*amp; py+=Math.cos(spd*0.86+sdist*0.04)*amp*0.65; }
      }
      if(sig.type===3){
        const sdist=Math.sqrt(dist2(px,py,sig.x,sig.y));
        if(sdist<sig.r*3.0) flashBoost=Math.max(flashBoost,((Math.sin(frame*0.24+sdist*0.03)+1)*0.5)*0.5*(1-sdist/(sig.r*3.0))*sig.intensity);
      }
    }
    // Cache screen position for signal zone mesh drawing
    this.sx=px; this.sy=py;
    if(px<-80||px>W+80||py<-80||py>H+80) return;
    const fs=Math.max(5,sc*28)|0;
    const t=Math.min(1,Math.pow(sc,1.2)*1.6);
    const ex=Math.min(1,this.excite+flashBoost);
    const r=(255-(255-this.cr)*t)|0;
    const gv=(255-(255-this.cg)*t)|0;
    const bv=(255-(255-this.cb)*t)|0;
    const fr=Math.min(255,(r+(200-r)*ex))|0;
    const fg=Math.max(0,(gv*(1-ex*.78))|0);
    const fb=Math.max(0,(bv*(1-ex*.88))|0);
    // в”Җв”Җ Opacity: boost to 0.75 when particles are color-excited в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const baseAlpha=Math.min(.5,t*.55);
    const boostedAlpha=baseAlpha+(0.75-baseAlpha)*Math.min(1,ex*1.8);
    g.save();
    const moodF=0.80+mood*0.40; // particles brighter when mood is high
    g.globalAlpha=this.nameAlpha>=0?this.nameAlpha:Math.min(0.80,boostedAlpha*moodF);
    g.font=`${fs}px "Courier New",monospace`;
    g.fillStyle=`rgb(${fr},${fg},${fb})`;
    g.textAlign='center'; g.textBaseline='middle';
    g.fillText(this.char,px,py);
    g.restore();
  }
}

// Half size: DOT_PITCH=3px, DOT_R=1.5px
const DOT_PITCH=3, DOT_R=1.5, VCENTER=11.5, LETTER_GAP=0;

function buildGlyphOffsets(){
  let totalCols=0;
  LETTER_DEFS.forEach((ld,i)=>{ totalCols+=ld.grid[0].length+(i<LETTER_DEFS.length-1?LETTER_GAP:0); });
  const pts=[];
  let col0=0;
  for(const {dy,grid} of LETTER_DEFS){
    const lw=grid[0].length;
    for(let row=0;row<grid.length;row++)
      for(let col=0;col<lw;col++)
        if(grid[row][col]==='1')
          pts.push({ox:(col0+col-totalCols/2)*DOT_PITCH, oy:(dy+row-VCENTER)*DOT_PITCH});
    col0+=lw+LETTER_GAP;
  }
  return pts;
}
const GLYPH_OFFSETS=buildGlyphOffsets();

// в”Җв”Җ Signal вҖ” 6 types, particle-behavior-driven в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const SIG_TYPES=6;
class Signal {
  constructor(){
    const halfW=(GLYPH_OFFSETS.reduce((m,p)=>Math.max(m,Math.abs(p.ox)),0))+50;
    this.x=halfW+80+Math.random()*(W-halfW*2-160);
    // In portrait mobile, keep signals away from the bottom gauge area
    const _spawnBottom=(isMobile&&H>W)?H-85:H-90;
    this.y=90+Math.random()*Math.max(0,_spawnBottom-90);
    this.r=(35+Math.random()*45)*SC; // SC normalises size to MacBook 956px-height baseline
    this.age=0; this.maxAge=420+Math.floor(Math.random()*280); // each signal has own lifespan
    this.type=Math.floor(Math.random()*SIG_TYPES);
    this.triggered=false; this.minAge=35;
    this.phase=Math.random()*Math.PI*2;
    // в”Җв”Җ Organic blob shape data в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const N=8;
    this.blobN=N;
    // Evenly spaced base angles with Вұ30% jitter, sorted to keep angular order
    this.blobAngles=Array.from({length:N},(_,i)=>
      i*Math.PI*2/N+(Math.random()-0.5)*Math.PI*2/N*0.6).sort((a,b)=>a-b);
    this.blobAmps  =Array.from({length:N},()=>0.18+Math.random()*0.38);
    this.blobFreqs =Array.from({length:N},()=>0.018+Math.random()*0.028);
    this.blobPhases=Array.from({length:N},()=>Math.random()*Math.PI*2);
    // Blob appears with a delay вҖ” feels like it's being "detected"
    this.blobStartAge=60+Math.floor(Math.random()*80);
    // Signal personality: fake (~20%) вҶ’ penalty on catch
    this.hidden=false;
    this.fake=Math.random()<0.20;
    // Moving signals: activated once combo вүҘ 3, speed scales with streak
    if(combo>=3){
      const spd=(0.35+Math.min(combo,8)*0.09)*(isMobile?0.65:1.0), a=Math.random()*Math.PI*2;
      this.mvx=Math.cos(a)*spd; this.mvy=Math.sin(a)*spd;
    } else { this.mvx=0; this.mvy=0; }
  }
  get intensity(){ return Math.min(1,this.age/40)*Math.min(1,(this.maxAge-this.age)/50); }
  get canTrigger(){ return this.age>=this.minAge&&!this.triggered; }
  get hotX(){ return this.x+Math.sin(this.age*0.022+this.phase)*Math.min(26,this.r*0.38); }
  get hotY(){ return this.y+Math.cos(this.age*0.016+this.phase*0.75)*Math.min(20,this.r*0.30); }
  // Mobile: base 0.65 вҶ’ min ~r*0.65 radius (вүҲ32px), max ~r*1.0 (вүҲ50px) вҖ” finger-friendly
  get hotR(){ const base=isMobile?0.65:0.28, range=isMobile?0.35:0.22; return this.r*(base+range*Math.abs(Math.sin(this.age*0.040+this.phase))); }
  get atPeak(){ return Math.abs(Math.sin(this.age*0.040+this.phase))>0.82; } // rhythm window
  containsMouse(){
    const hr=this.hotR, hx=this.hotX, hy=this.hotY, hr2=hr*hr;
    if(dist2(mouseX,mouseY,hx,hy)<hr2) return true;
    for(const tp of touchPoints.values()){
      if(dist2(tp.x,tp.y,hx,hy)<hr2) return true;
    }
    return false;
  }
  update(){
    this.age++;
    if(this.mvx!==0||this.mvy!==0){
      this.x+=this.mvx; this.y+=this.mvy;
      const mg=this.r+80;
      if(this.x<mg){this.x=mg;this.mvx=Math.abs(this.mvx);}
      if(this.x>W-mg){this.x=W-mg;this.mvx=-Math.abs(this.mvx);}
      if(this.y<mg){this.y=mg;this.mvy=Math.abs(this.mvy);}
      if(this.y>H-mg){this.y=H-mg;this.mvy=-Math.abs(this.mvy);}
    }
  }
}

// в”Җв”Җ Formation dot вҖ” varied shapes morphing into/from circle dot в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Shapes: 0=circle, 1=square, 2=triangle, 3=diamond, 4=char
const FSHAPES=['circle','square','triangle','diamond','char'];

class FormDot {
  constructor(tx,ty,sx,sy,scale=1){
    this.tx=tx; this.ty=ty; this.x=sx; this.y=sy;
    this.scale=scale;
    this.vx=0; this.vy=0;
    this.alpha=0; this.state='in';
    this.delay=Math.floor(Math.random()*22);
    // Incoming shape (transforms INTO a dot as it forms)
    this.inShape=FSHAPES[Math.floor(Math.random()*FSHAPES.length)];
    this.inChar=randChar();
    this.inRot=Math.random()*Math.PI*2;
    // Outgoing shape (dot transforms INTO this as it disperses)
    this.outShape=FSHAPES[Math.floor(Math.random()*FSHAPES.length)];
    this.outChar=randChar();
    this.outRot=Math.random()*Math.PI*2;
    // blend=0: full shape, blend=1: pure circle dot
    this.blend=0;
    // Dispersion physics
    this.accel=1.0;
    this.scatterX=0; this.scatterY=0; this.startAlpha=0;
  }

  update(){
    if(this.delay>0){ this.delay--; return; }
    if(this.state==='in'){
      this.x+=(this.tx-this.x)*.15;
      this.y+=(this.ty-this.y)*.15;
      this.alpha=Math.min(0.95,this.alpha+0.07);
      this.blend=Math.min(1,this.blend+0.08);  // morph toward circle
    } else {
      // Accelerating outward burst
      this.vx*=this.accel; this.vy*=this.accel;
      this.x+=this.vx; this.y+=this.vy;
      this.blend=Math.max(0,this.blend-0.038);  // morph back to shape
      // Distance-based opacity: smoothly fades as particle travels outward
      const dist=Math.sqrt(dist2(this.x,this.y,this.scatterX,this.scatterY));
      this.alpha=Math.max(0, this.startAlpha*(1-dist/300));
    }
  }

  scatter(){
    this.state='out';
    // Store origin for distance-based opacity fade
    this.scatterX=this.x; this.scatterY=this.y;
    this.startAlpha=this.alpha;
    const a=Math.random()*Math.PI*2;
    const spd=0.6+Math.random()*1.4;  // gentle initial speed, acceleration does the work
    this.vx=Math.cos(a)*spd; this.vy=Math.sin(a)*spd;
    this.accel=1.040+Math.random()*0.025;  // smooth but clear acceleration
    // Randomise out shape
    this.outShape=FSHAPES[Math.floor(Math.random()*FSHAPES.length)];
    this.outChar=randChar();
    this.outRot=Math.random()*Math.PI*2;
  }

  _shape(type,ch,rot,sz){
    // Draw shape centered at origin (caller must translate)
    const r=sz;
    switch(type){
      case 'circle':
        g.beginPath(); g.arc(0,0,r,0,Math.PI*2); g.fill(); break;
      case 'square':
        g.save(); g.rotate(rot+frame*0.03);
        g.beginPath(); g.rect(-r,-r,r*2,r*2); g.fill();
        g.restore(); break;
      case 'triangle':
        g.save(); g.rotate(rot+frame*0.025);
        g.beginPath();
        g.moveTo(0,-r*1.3); g.lineTo(r*1.15,r*0.75); g.lineTo(-r*1.15,r*0.75);
        g.closePath(); g.fill();
        g.restore(); break;
      case 'diamond':
        g.save(); g.rotate(rot+frame*0.02);
        g.beginPath();
        g.moveTo(0,-r*1.5); g.lineTo(r*1.0,0); g.lineTo(0,r*1.5); g.lineTo(-r*1.0,0);
        g.closePath(); g.fill();
        g.restore(); break;
      case 'char':
        g.font=`bold ${Math.max(4,r*4)}px "Courier New",monospace`;
        g.textAlign='center'; g.textBaseline='middle';
        g.fillText(ch,0,0); break;
    }
  }

  draw(){
    if(this.alpha<0.01) return;
    const b=this.blend;
    const shape=this.state==='in'?this.inShape:this.outShape;
    const ch=this.state==='in'?this.inChar:this.outChar;
    const rot=this.state==='in'?this.inRot:this.outRot;
    const r=DOT_R*this.scale;
    g.save();
    g.translate(this.x,this.y);
    g.fillStyle='#111';

    if(b>=0.97){
      // Pure circle dot вҖ” apply heartbeat bounce + opacity flicker when formed
      const pulse=formPulse;
      const sc=1+0.10*pulse;          // scale up to +10% on beat peak
      const pulseAlpha=0.82+0.10*pulse; // opacity 0.82вҖ“0.92
      if(sc>1.001){ g.scale(sc,sc); }
      g.globalAlpha=pulseAlpha;
      g.beginPath(); g.arc(0,0,r,0,Math.PI*2); g.fill();
    } else if(b<=0.03){
      // Pure shape
      g.globalAlpha=this.alpha;
      this._shape(shape,ch,rot,r*1.8);
    } else {
      // Cross-fade: shape fades out, circle fades in
      // Shape component
      g.globalAlpha=this.alpha*(1-b);
      this._shape(shape,ch,rot,r*(1+(1-b)*0.9));
      // Circle component
      g.globalAlpha=this.alpha*b;
      g.beginPath(); g.arc(0,0,r,0,Math.PI*2); g.fill();
    }
    g.restore();
  }

  get done(){ return this.state==='out'&&this.alpha<0.01; }
}

let audioCtx=null, _reverbSend=null;

function getAudio(){
  if(!audioCtx){

    // в”Җв”Җ Convolver reverb (spacious room feel) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const sr=audioCtx.sampleRate, len=Math.floor(sr*1.6);
    const buf=audioCtx.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3.2)*0.65;
    }
    const conv=audioCtx.createConvolver(); conv.buffer=buf;
    const rvGain=audioCtx.createGain(); rvGain.gain.value=0.28;
    // slight high-shelf cut on reverb tail вҖ” keeps it airy, not muddy
    const rvFilter=audioCtx.createBiquadFilter();
    rvFilter.type='highshelf'; rvFilter.frequency.value=3200; rvFilter.gain.value=-8;
    conv.connect(rvFilter); rvFilter.connect(rvGain); rvGain.connect(audioCtx.destination);
    _reverbSend=conv;
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// freq, dur(s), type, vol, detune вҖ” sends to both dry + reverb
function playTone(freq, dur, type='sine', vol=0.07, detune=0){
  try{
    const ac=getAudio(); const t=ac.currentTime;
    const osc=ac.createOscillator(), gain=ac.createGain();
    osc.type=type; osc.frequency.value=freq; osc.detune.value=detune;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(vol,t+0.007);
    gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
    osc.connect(gain);
    gain.connect(ac.destination);          // dry
    if(_reverbSend) gain.connect(_reverbSend); // wet
    osc.start(t); osc.stop(t+dur+0.05);
  }catch(e){}
}

// в”Җв”Җ Sound events в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function soundCatch(rhythm=false){
  // 1200Hz fundamental + subtle octave harmonic вҖ” clean, spatial
  const v=rhythm?0.08:0.065;
  playTone(1200, 0.50, 'sine', v);
  playTone(2400, 0.28, 'sine', v*0.35);       // octave shimmer
  if(rhythm){
    setTimeout(()=>{ playTone(1800,0.38,'sine',0.055); playTone(3600,0.20,'sine',0.018); },45);
  }
}
function soundMiss(){
  // low mellow thud вҖ” sine, not sawtooth
  playTone(260, 0.60, 'sine', 0.065);
  playTone(130, 0.45, 'sine', 0.030);
}
function soundFake(){
  // soft dissonant interval вҖ” unresolved feeling
  playTone(340, 0.40, 'sine', 0.050, -6);
  playTone(250, 0.36, 'sine', 0.040,  6);
}
function soundCombo(n){
  const base=800+n*90;
  playTone(base,  0.40, 'sine', 0.07);
  playTone(base*1.5, 0.30, 'sine', 0.04);       // perfect fifth up
  setTimeout(()=>playTone(base*2, 0.28,'sine',0.03),55);
}
function soundWin(){
  [800,1000,1200,1600,2000].forEach((f,i)=>setTimeout(()=>playTone(f,0.55,'sine',0.07),i*120));
}
function soundLose(){
  [520,400,310,220,160].forEach((f,i)=>setTimeout(()=>playTone(f,0.55,'sine',0.06),i*140));
}

function triggerFormation(fcx,fcy,scale=1){
  formState='forming'; formTimer=0;
  formCX=fcx; formCY=fcy;
  formStayR=110*scale;
  formDots=GLYPH_OFFSETS.map(({ox,oy})=>{
    const a=Math.random()*Math.PI*2, d=25+Math.random()*150;
    return new FormDot(fcx+ox*scale,fcy+oy*scale, fcx+Math.cos(a)*d, fcy+Math.sin(a)*d, scale);
  });
}
function disperseFormation(){
  formState='dispersing';
  formDots.forEach(d=>d.scatter());
}

// в”Җв”Җ Score gauge вҖ” desktop: right vertical / mobile: bottom horizontal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawGauge(){
  g.save();
  g.setLineDash([]);

  // Shared rainbow colour sampler (reused by both layouts)
  function sampleRainbow(stops, p){
    for(let i=0;i<stops.length-1;i++){
      const [s0,c0]=stops[i],[s1,c1]=stops[i+1];
      if(p>=s0&&p<=s1){const f=(p-s0)/(s1-s0);return c0.map((v,j)=>Math.round(v+(c1[j]-v)*f));}
    }
    return stops[stops.length-1][1];
  }

  if(!isMobile){
    // в”Җв”Җ DESKTOP: vertical gauge on right edge в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const gx=W-24;
    const gt=70, gb=H-70, gh=gb-gt;
    const indY=gt+(1-gaugePos)*gh;

    const trackGrad=g.createLinearGradient(0,gt,0,gb);
    trackGrad.addColorStop(0,    'rgba(220,30,30,0.60)');
    trackGrad.addColorStop(0.15, 'rgba(230,100,20,0.55)');
    trackGrad.addColorStop(0.30, 'rgba(220,200,20,0.55)');
    trackGrad.addColorStop(0.45, 'rgba(40,180,40,0.55)');
    trackGrad.addColorStop(0.60, 'rgba(30,100,210,0.55)');
    trackGrad.addColorStop(0.75, 'rgba(100,20,180,0.55)');
    trackGrad.addColorStop(1,    'rgba(10,10,10,0.60)');
    g.fillStyle=trackGrad;
    g.fillRect(gx-1,gt,2,gh);

    const stops=[
      [0,[220,30,30]],[0.15,[230,100,20]],[0.30,[220,200,20]],
      [0.45,[40,180,40]],[0.60,[30,100,210]],[0.75,[100,20,180]],[1,[10,10,10]]
    ];
    const ticks=[{v:10,lbl:'profit +10'},{v:5,lbl:'+5'},{v:0,lbl:'BEP'},{v:-5,lbl:'вҲ’5'},{v:-10,lbl:'profit вҲ’10'}];
    g.font='8.4px "Courier New",monospace'; g.textAlign='right'; g.textBaseline='middle';
    for(const tk of ticks){
      const ty=gt+((10-tk.v)/20)*gh;
      const isBep=tk.v===0, isEnd=Math.abs(tk.v)===10;
      g.strokeStyle=isBep?'rgba(40,40,40,0.30)':isEnd?'rgba(40,40,40,0.22)':'rgba(40,40,40,0.14)';
      g.lineWidth=1;
      g.beginPath(); g.moveTo(gx-(isBep?6:4),ty); g.lineTo(gx+3,ty); g.stroke();
      const lC=sampleRainbow(stops,1-(tk.v+10)/20);
      g.fillStyle=`rgba(${lC[0]},${lC[1]},${lC[2]},0.40)`;
      g.fillText(tk.lbl,gx-10,ty);
    }
    const rC=sampleRainbow(stops,1-gaugePos);
    const arrColor=`rgba(${rC[0]},${rC[1]},${rC[2]},0.85)`;
    const as=4.5;
    g.fillStyle=arrColor;
    g.beginPath(); g.moveTo(gx,indY); g.lineTo(gx-as*1.9,indY-as); g.lineTo(gx-as*1.9,indY+as); g.closePath(); g.fill();
    const lbl=score===0?'BEP':score>0?`+${score}`:`${score}`;
    g.font='bold 9.6px "Courier New",monospace'; g.fillStyle=arrColor; g.textAlign='right';
    g.fillText(lbl,gx-13,indY);

  } else {
    // в”Җв”Җ MOBILE: horizontal gauge at bottom в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // visualViewport.height = мЈјмҶҢм°Ҫ нҸ¬н•Ё мӢӨм ң ліҙмқҙлҠ” лҶ’мқҙ вҶ’ мһҳлҰј л°©м§Җ
    const visH = (window.visualViewport ? window.visualViewport.height : H);
    // мә”лІ„мҠӨ мўҢн‘ңкі„лЎң ліҖнҷҳ: мә”лІ„мҠӨлҠ” innerHeight(H) кё°мӨҖ, visHк°Җ лҚ” мһ‘мқ„ мҲҳ мһҲмқҢ
    const gaugeBottom = Math.min(H, visH) - 52 - safeAreaBottom;
    const gy = gaugeBottom;
    const gl=16, gr=W-16, gw=gr-gl;  // нҷ”л©ҙ м „мІҙ л„Ҳл№„
    const indX=gl+gaugePos*gw;

    const trackGrad=g.createLinearGradient(gl,0,gr,0);
    trackGrad.addColorStop(0,    'rgba(10,10,10,0.60)');
    trackGrad.addColorStop(0.25, 'rgba(100,20,180,0.55)');
    trackGrad.addColorStop(0.40, 'rgba(30,100,210,0.55)');
    trackGrad.addColorStop(0.55, 'rgba(40,180,40,0.55)');
    trackGrad.addColorStop(0.70, 'rgba(220,200,20,0.55)');
    trackGrad.addColorStop(0.85, 'rgba(230,100,20,0.55)');
    trackGrad.addColorStop(1,    'rgba(220,30,30,0.60)');
    g.fillStyle=trackGrad;
    g.fillRect(gl,gy-1,gw,2);

    const stops=[
      [0,[10,10,10]],[0.25,[100,20,180]],[0.40,[30,100,210]],
      [0.55,[40,180,40]],[0.70,[220,200,20]],[0.85,[230,100,20]],[1,[220,30,30]]
    ];
    const ticks=[{v:-10,lbl:'вҲ’10'},{v:-5,lbl:'вҲ’5'},{v:0,lbl:'BEP'},{v:5,lbl:'+5'},{v:10,lbl:'+10'}];
    g.font=`${Math.round(8*SC)}px "Courier New",monospace`; g.textAlign='center'; g.textBaseline='top';
    for(const tk of ticks){
      const tx=gl+(tk.v+10)/20*gw;
      const isBep=tk.v===0, isEnd=Math.abs(tk.v)===10;
      g.strokeStyle=isBep?'rgba(40,40,40,0.30)':isEnd?'rgba(40,40,40,0.22)':'rgba(40,40,40,0.14)';
      g.lineWidth=1;
      g.beginPath(); g.moveTo(tx,gy-(isBep?6:4)); g.lineTo(tx,gy+3); g.stroke();
      const lC=sampleRainbow(stops,(tk.v+10)/20);
      g.fillStyle=`rgba(${lC[0]},${lC[1]},${lC[2]},0.45)`;
      g.fillText(tk.lbl,tx,gy+6);
    }
    const rC=sampleRainbow(stops,gaugePos);
    const arrColor=`rgba(${rC[0]},${rC[1]},${rC[2]},0.85)`;
    const as=5*SC;
    g.fillStyle=arrColor;
    g.beginPath(); g.moveTo(indX,gy); g.lineTo(indX-as,gy-as*1.9); g.lineTo(indX+as,gy-as*1.9); g.closePath(); g.fill();
    const lbl=score===0?'BEP':score>0?`+${score}`:`${score}`;
    g.font=`bold ${Math.round(10*SC)}px "Courier New",monospace`;
    g.fillStyle=arrColor; g.textAlign='center'; g.textBaseline='bottom';
    g.fillText(lbl,indX,gy-as*2.2);
  }

  g.restore();
}

  try{

  if(gameOver) return;
  gameOver=true; gameOverType=type;
  signals=[]; formDots=[]; formState='idle';
  if(type==='win') soundWin(); else soundLose();

  document.body.appendChild(overlay);

  // в”Җв”Җ Restart в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function doRestart(){
    clearInterval(cdInterval);
    if(!document.body.contains(overlay)) return;
    document.body.removeChild(overlay);
    score=0; gaugePos=0.5; combo=0; comboTimer=0;
    mood=0.5; signals=[]; misses=[]; formDots=[];
    formState='idle'; chainLine=null; comboPopups=[];
    lastCatchFrame=-9999; nextSignalIn=80;
    gameOver=false; gameOverType=null;
    statCatches=0; statMisses=0; statFakes=0; statRhythm=0; statMaxCombo=0;
  }
  document.getElementById('restart-btn').addEventListener('click', doRestart);

  // 30мҙҲ м№ҙмҡҙнҠёлӢӨмҡҙ нӣ„ мһҗлҸҷ мһ¬мӢңмһ‘
  let cdSec=30;
  const cdEl=document.getElementById('restart-countdown');
  const cdInterval=setInterval(()=>{
    cdSec--;
    if(cdEl) cdEl.textContent=`(${cdSec})`;
    if(cdSec<=0) doRestart();
  }, 1000);
  document.getElementById('restart-btn').addEventListener('mouseenter',e=>{
    e.target.style.borderColor='#888'; e.target.style.color='#333';
  });
  document.getElementById('restart-btn').addEventListener('mouseleave',e=>{
    e.target.style.borderColor='#ccc'; e.target.style.color='#666';
  });

  // в”Җв”Җ Share в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  document.getElementById('share-btn').addEventListener('click', async ()=>{
    const url=location.href;
    const shareData={
      title:'Profit Field',
      text: gameOverType==='win'
        ? 'I reached +PROFIT 10 in Profit Field. Can you beat it?'
        : 'I got crushed at вҲ’PROFIT 10 in Profit Field. Give it a try.',
      url
    };
    if(navigator.share && navigator.canShare && navigator.canShare(shareData)){
      // Mobile: native share sheet (KakaoTalk, WhatsApp, AirDrop, etc.)
      try{ await navigator.share(shareData); } catch(e){ /* dismissed */ }
    } else {
      // Desktop: copy URL to clipboard + show toast
      try{
        await navigator.clipboard.writeText(url);
      } catch(e){
        // Fallback for older browsers
        const ta=document.createElement('textarea');
        ta.value=url; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      const toast=document.getElementById('share-toast');
      toast.style.opacity='1';
      setTimeout(()=>{ toast.style.opacity='0'; }, 2000);
    }
  });
  document.getElementById('share-btn').addEventListener('mouseenter',e=>{
    e.target.style.borderColor='#bbb'; e.target.style.color='#888';
  });
  document.getElementById('share-btn').addEventListener('mouseleave',e=>{
    e.target.style.borderColor='#e8e8e8'; e.target.style.color='#bbb';
  });
}

fetchCounts(); // pre-fetch current counts on page load

function loop(){
  if(gameOver){ requestAnimationFrame(loop); return; }
  requestAnimationFrame(loop);
  g.setTransform(DPR, 0, 0, DPR, 0, 0); // re-apply every frame вҖ” save/restore can't corrupt it
  frame++;

  // в”Җв”Җ Combo timer + mood drift в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(++comboTimer>COMBO_TIMEOUT&&combo>0) combo=0;
  mood+=(0.5-mood)*0.0008;
  gaugePos+=(((score+10)/20)-gaugePos)*0.06; // smooth to target

  // в”Җв”Җ Mouse idle tracking в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const dxM=mouseX-lastMouseX, dyM=mouseY-lastMouseY;
  if(dxM*dxM+dyM*dyM>1){ mouseIdleFrames=0; } else if(mouseX>-100){ mouseIdleFrames++; }
  lastMouseX=mouseX; lastMouseY=mouseY;

  // в”Җв”Җ Heartbeat pulse (finish prev work) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Sharp ~75 BPM sine pulses; only active while 'formed'
  if(formState==='formed'){
    formPulse=Math.pow(Math.max(0,Math.sin(frame*0.13)),1.5);
  } else {
    formPulse=Math.max(0,formPulse-0.07); // quick fade-out when not formed
  }

  // Signal lifecycle вҖ” each signal lives and dies independently
  for(let i=signals.length-1;i>=0;i--){
    const sig=signals[i];
    sig.update();
    if(sig.canTrigger&&sig.containsMouse()&&(formState==='idle'||formState==='dispersing'||formState==='forming')){
      if(formState==='dispersing'||formState==='forming'){ formDots=[]; formState='idle'; }   // clear old scatter/form immediately
      sig.triggered=true; sig.maxAge=sig.age+8;
      if(sig.fake){
        misses.push({x:sig.hotX,y:sig.hotY,age:0,big:true});
        combo=0; comboTimer=0; mood=Math.max(0,mood-0.18);
        score=Math.max(-10,score-2);
        statFakes++;
        soundFake();
        if(isMobile&&navigator.vibrate) navigator.vibrate([25,40,25]); // double-buzz for fake
        if(score<=-10) triggerGameOver('lose');
        for(let ri=0;ri<4;ri++) ripples.push({x:sig.hotX+(Math.random()-.5)*35,y:sig.hotY+(Math.random()-.5)*35,r:5});
      } else {
        const isRhythm=sig.atPeak;
        const dt=frame-lastCatchFrame;
        if(lastCatchFrame>0&&dt<95) chainLine={x1:lastCatchX,y1:lastCatchY,x2:sig.hotX,y2:sig.hotY,age:0};
        lastCatchX=sig.hotX; lastCatchY=sig.hotY; lastCatchFrame=frame;
        combo++; comboTimer=0; mood=Math.min(1,mood+0.09);
        // Rhythm bonus: +2 on peak pulse, +1 otherwise
        const scoreGain=isRhythm?2:1;
        score=Math.min(10,score+scoreGain);
        statCatches++; if(isRhythm) statRhythm++;
        if(combo>statMaxCombo) statMaxCombo=combo;
        soundCatch(isRhythm);
        if(isMobile&&navigator.vibrate) navigator.vibrate(isRhythm?[15,20,30]:20); // rhythm = two pulses
        if(combo>1&&combo%3===0) soundCombo(combo);
        if(isRhythm) comboPopups.push({x:sig.hotX,y:sig.hotY-18,n:'RHYTHM',age:0,rhythm:true});
        if(score>=10) triggerGameOver('win');
        const scale=(sig.r/80)*(1+Math.min(combo-1,5)*0.08);
        triggerFormation(sig.hotX,sig.hotY,scale);
        if(combo>1) comboPopups.push({x:sig.hotX,y:sig.hotY,n:combo,age:0});
      }
    }
    if(sig.age>sig.maxAge){
      if(!sig.triggered){
        misses.push({x:sig.x,y:sig.y,age:0,big:false});
        mood=Math.max(0,mood-0.04);
        score=Math.max(-10,score-1);
        statMisses++; soundMiss();
        if(isMobile&&navigator.vibrate) navigator.vibrate(12); // light buzz on miss
        if(score<=-10) triggerGameOver('lose');
      }
      signals.splice(i,1);
    }
  }
  // Staggered independent spawning: organic timing, occasional bursts
  if(--nextSignalIn<=0){
    const activeCount=signals.filter(s=>!s.triggered).length;
    if(activeCount<4){
      signals.push(new Signal());
      // When screen is empty, occasionally add a second signal
      if(activeCount===0 && Math.random()<0.25) signals.push(new Signal());
    }
    // 20% chance of a long breather (6~10s); otherwise slower re-spawn
    nextSignalIn=Math.random()<0.20
      ? 360+Math.floor(Math.random()*240)   // long pause 6~10s
      : 160+Math.floor(Math.random()*100);  // moderate gap ~2.7-4.3s
  }

  // Formation states
  if(formState==='forming'){
    if(++formTimer>50){ formState='formed'; formTimer=0; }
  } else if(formState==='formed'){
    // Disperse: mouse leaves zone OR ~1 second (60 frames) passes
    const mouseLeft=dist2(mouseX,mouseY,formCX,formCY)>formStayR*formStayR;
    if(mouseLeft||++formTimer>60){ disperseFormation(); formTimer=0; }
  } else if(formState==='dispersing'){
    formDots=formDots.filter(d=>!d.done);
    if(formDots.length===0){
      formState='idle';
      nextSignalIn=Math.max(nextSignalIn,60); // brief pause before next can trigger
    }
  }

  // в”Җв”Җ Expand ripples в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  for(let i=ripples.length-1;i>=0;i--){
    ripples[i].r+=RIPPLE_SPEED;
    if(ripples[i].r>RIPPLE_MAX_R) ripples.splice(i,1);
  }

  // Draw background
  g.clearRect(0,0,W,H);
  // Mood-tinted background: warm when catching well, cool when missing
  // Background: mood + score both influence temperature
  const _md=(mood-0.5)*2;          // mood: -1..1
  const _sc=score/10;              // score: -1..1
  const _t=_md*0.4+_sc*0.6;       // blend (score-dominant)
  g.fillStyle=_t>=0
    ?`rgb(255,${Math.round(255-_t*10)},${Math.round(255-_t*22)})`
    :`rgb(${Math.round(255+_t*22)},${Math.round(255+_t*10)},255)`;
  g.fillRect(0,0,W,H);

  for(const p of parts){ p.update(signals); if(p.dead) p.init(false); }
  parts.sort((a,b)=>b.z-a.z);
  for(const p of parts) p.draw(signals);

  // в”Җв”Җ Particle-web signal zone indicators в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  for(const sig of signals){
    if(sig.triggered) continue;
    const blobFadeIn=Math.min(1,(sig.age-sig.blobStartAge)/35);
    if(blobFadeIn<=0) continue;
    const baseAlpha=Math.min(0.55,sig.intensity*0.65*blobFadeIn);
    if(baseAlpha<0.02) continue;
    const hx=sig.hotX, hy=sig.hotY, hr=sig.hotR;
    if(hr<5) continue;

    // Gather particles within wide signal zone (screen space)
    // zoneR uses sig.r directly вҖ” decoupled from hotR (catch sensitivity)
    const zoneR=sig.r*(1.6+1.6*Math.abs(Math.sin(sig.age*0.040+sig.phase)));   // wide visual radius
    const near=[];
    for(const p of parts){
      const dx=p.sx-hx, dy=p.sy-hy;
      const d2=dx*dx+dy*dy;
      if(d2<zoneR*zoneR) near.push({p, d2, dist:Math.sqrt(d2)});
    }
    if(near.length<2) continue;

    g.save();
    g.setLineDash([]);

    // Connect across full zone вҖ” long-range web
    // Each particle connects to up to 5 nearest others (prevents spaghetti but keeps spread)
    const MAX_CONN=5;
    const drawn=new Set();
    for(let i=0;i<near.length;i++){
      let connCount=0;
      // Sort potential partners by distance for this particle
      const partners=[];
      for(let j=0;j<near.length;j++){
        if(i===j) continue;
        const ax=near[i].p.sx, ay=near[i].p.sy;
        const bx=near[j].p.sx, by=near[j].p.sy;
        const dx=ax-bx, dy=ay-by;
        partners.push({j, d2:dx*dx+dy*dy});
      }
      partners.sort((a,b)=>a.d2-b.d2);
      for(const {j, d2} of partners){
        if(connCount>=MAX_CONN) break;
        const key=i<j?`${i}-${j}`:`${j}-${i}`;
        if(drawn.has(key)) continue;
        drawn.add(key);
        const dist=Math.sqrt(d2);
        // Alpha: fade by distance between the two particles (capped to avoid NaN)
        const distFade=Math.max(0, 1-dist/(zoneR*1.6));
        const lineAlpha=baseAlpha*distFade*0.90;
        if(lineAlpha<0.015) continue;
        g.strokeStyle=`rgba(30,30,30,${lineAlpha.toFixed(3)})`;
        g.lineWidth=Math.max(0.4, 0.7*SC);
        g.beginPath();
        g.moveTo(near[i].p.sx, near[i].p.sy);
        g.lineTo(near[j].p.sx, near[j].p.sy);
        g.stroke();
        connCount++;
      }
    }

    // Small pulsing node dots at each particle position inside zone
    const pulse=0.6+0.4*Math.sin(sig.age*0.12+sig.phase);
    for(const {p, dist} of near){
      const nodeFade=(1-dist/zoneR)*baseAlpha*pulse*1.1;
      if(nodeFade<0.02) continue;
      g.fillStyle=`rgba(30,30,30,${Math.min(0.55,nodeFade).toFixed(3)})`;
      g.beginPath();
      g.arc(p.sx, p.sy, 1.2, 0, Math.PI*2);
      g.fill();
    }

    // Hotspot indicator
    g.setLineDash([]);
    if(!isMobile){
      // Desktop: faint dashed ring
      g.strokeStyle=`rgba(40,40,40,${(baseAlpha*0.22).toFixed(3)})`;
      g.lineWidth=0.6;
      g.setLineDash([2,6]);
      g.lineDashOffset=-(sig.age*0.22)%8;
      g.beginPath();
      g.arc(hx, hy, hr*(0.90+0.10*Math.sin(sig.age*0.045+sig.phase)), 0, Math.PI*2);
      g.stroke();
      g.setLineDash([]);
    } else {
      // Mobile: no ring вҖ” ultra-faint filled shadow, 0вҖ“4% opacity.
      // Feels like intuition rather than instruction.
      const pulse=(Math.sin(sig.age*0.08+sig.phase)*0.5+0.5);
      const faintA=Math.min(0.04, baseAlpha*(0.015+pulse*0.025));
      g.fillStyle=`rgba(40,40,40,${faintA.toFixed(3)})`;
      g.beginPath();
      g.arc(hx, hy, hr*0.55, 0, Math.PI*2);
      g.fill();
    }

    g.restore();
  }

  // в”Җв”Җ Miss indicators: -profit fades in/out where signal expired untriggered в”Җ
  for(let i=misses.length-1;i>=0;i--){
    const m=misses[i];
    m.age++;
    const MISS_LIFE=100;
    if(m.age>MISS_LIFE){ misses.splice(i,1); continue; }
    // Fade in for first 15 frames, hold, fade out for last 30
    const fadeIn=Math.min(1,m.age/15);
    const fadeOut=Math.max(0,1-(m.age-MISS_LIFE+30)/30);
    const alpha=Math.min(fadeIn,fadeOut)*0.70;
    if(alpha<0.01) continue;
    g.save();
    g.globalAlpha=alpha;
    g.font=m.big?'bold 22px "Courier New",monospace':'bold 16px "Courier New",monospace';
    g.fillStyle='#222';
    g.textAlign='center';
    g.textBaseline='middle';
    const drift=-18*(m.age/MISS_LIFE);
    g.fillText('-profit',m.x,m.y+drift);
    g.restore();
  }

  // в”Җв”Җ Chain line (two consecutive catches) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(chainLine){
    chainLine.age++;
    if(chainLine.age>70) chainLine=null;
    else{
      g.save(); g.globalAlpha=(1-chainLine.age/70)*0.28;
      g.strokeStyle='#222'; g.lineWidth=0.7; g.setLineDash([3,5]);
      g.beginPath(); g.moveTo(chainLine.x1,chainLine.y1); g.lineTo(chainLine.x2,chainLine.y2); g.stroke();
      g.restore();
    }
  }

  // в”Җв”Җ Combo popups в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  for(let i=comboPopups.length-1;i>=0;i--){
    const cp=comboPopups[i]; cp.age++;
    if(cp.age>60){comboPopups.splice(i,1);continue;}
    const t=cp.age/60;
    const a=(t<0.2?t/0.2:1-t)*0.50;
    g.save(); g.globalAlpha=a;
    g.font=cp.rhythm?'bold 10px "Courier New",monospace':'bold 12px "Courier New",monospace';
    g.fillStyle=cp.rhythm?'rgba(190,30,30,0.85)':'#111';
    g.textAlign='center'; g.textBaseline='middle';
    g.fillText(cp.rhythm?cp.n:`Г—${cp.n}`,cp.x,cp.y-30*t);
    g.restore();
  }

  // Formation dots (screen-space, no 3D projection)
  for(const d of formDots){ d.update(); d.draw(); }

  drawGauge();
  if(!isMobile){
    drawCursor();
  } else if(touchPoints.size>0){
    // Draw subtle touch indicators for each active finger
    for(const tp of touchPoints.values()){
      g.save();
      g.beginPath();
      g.arc(tp.x, tp.y, 20*SC, 0, Math.PI*2);
      g.strokeStyle='rgba(40,40,40,0.28)';
      g.lineWidth=1.2;
      g.stroke();
      g.beginPath();
      g.arc(tp.x, tp.y, 3.5*SC, 0, Math.PI*2);
      g.fillStyle='rgba(40,40,40,0.40)';
      g.fill();
      g.restore();
    }
  }
}
loop();
</script>
